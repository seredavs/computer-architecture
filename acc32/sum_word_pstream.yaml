limit: 0xFFFF
memory_size: 8192

memory_mapped_io:
  0x80: [2, -1, 1]
  0x84: [0, 0]

reports:
  - name: "Execution"
    slice: all
    view: |
      {pc}: {instruction} {pc:label} | {Acc:hex}

  - name: "Result"
    slice: last
    view: |
      numio[0x80]: {io:0x80:dec}
      numio[0x84]: {io:0x84:dec}
      symio[0x80]: {io:0x80:sym}
      symio[0x84]: {io:0x84:sym}
